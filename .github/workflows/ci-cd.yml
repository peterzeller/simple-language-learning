name: CI/CD

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-cd-${{ github.ref }}
  cancel-in-progress: true

jobs:
  compile:
    name: Compile
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build standalone server
        run: npm run build

      - name: Copy static assets into the standalone bundle
        run: |
          cp -r public .next/standalone/
          mkdir -p .next/standalone/.next
          cp -r .next/static .next/standalone/.next/

      - name: Upload standalone artifact
        uses: actions/upload-artifact@v4
        with:
          name: next-standalone
          path: .next/standalone
          if-no-files-found: error

  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run lint
        run: npm run lint

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    environment: deployment
    needs:
      - compile
      - test
      - lint
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'

    steps:
      - name: Download static artifact
        uses: actions/download-artifact@v4
        with:
          name: next-standalone
          path: deploy

      - name: Set up SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.DEPLOY_SSH_PRIVATE_KEY }}

      - name: Add server to known hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -p "${{ env.DEPLOY_PORT }}" -H "${{ env.DEPLOY_HOST }}" >> ~/.ssh/known_hosts

      - name: Sync application bundle to server
        run: |
          rsync -avz --delete \
            --no-perms \
            --chmod=Du=rwx,Dg=rwx,Do=rx,Fu=rw,Fg=rw,Fo=r \
            -e "ssh -p ${{ env.DEPLOY_PORT }}" \
            deploy/ \
            "${{ env.DEPLOY_USER }}@${{ env.DEPLOY_HOST }}:${{ env.DEPLOY_PATH }}/"

      - name: Restart application service
        run: |
          ssh -p "${{ env.DEPLOY_PORT }}" \
            "${{ env.DEPLOY_USER }}@${{ env.DEPLOY_HOST }}" \
            "sudo systemctl restart '${{ env.DEPLOY_SERVICE }}'"
